<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="author" content="https://blog.xlsea.cn" />
    <title>%VITE_APP_TITLE%</title>
  </head>
  <body>
    <div id="app">
      <div
        style="
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          font-family: system-ui, sans-serif;
          color: #2080f0;
          background: #f5f7fa;
        "
      >
        <div style="width: 48px; height: 48px; border: 4px solid #2080f0; border-top-color: transparent; border-radius: 50%; animation: app-spin 0.8s linear infinite"></div>
        <p style="margin-top: 16px; font-size: 16px">加载中…</p>
      </div>
    </div>
    <style>
      @keyframes app-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
